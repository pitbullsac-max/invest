// ════════════════════════════════════════════════════════════════════
//  PARSER DAY TRADE (planilha Ricardo Saturnino)
// ════════════════════════════════════════════════════════════════════
function parseSheet(wb) {
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  let startRow=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(typeof r[0]==='number'&&r[0]>=1&&r[0]<=12&&typeof r[1]==='number'&&r[1]>=2020&&typeof r[11]==='number'&&r[11]>1000){startRow=i;break;}
  }
  if(startRow<0) return null;
  const daily=[];
  for(let i=startRow;i<rows.length;i++){
    const r=rows[i];
    if(typeof r[0]!=='number'||typeof r[11]!=='number'||r[11]<=0) continue;
    let dataStr='';
    if(r[5]){
      if(typeof r[5]==='number'){const d=new Date(Math.round((r[5]-25569)*86400*1000));dataStr=d.toISOString().split('T')[0];}
      else if(r[5] instanceof Date){dataStr=r[5].toISOString().split('T')[0];}
      else{dataStr=String(r[5]).split('T')[0];}
    }
    daily.push({mes:Math.round(r[0]),ano:Math.round(r[1]),data:dataStr,taxa:n(r[7]),financeiro:n(r[9]),saldo:n(r[11]),obs:r[12]?String(r[12]):''});
  }
  const COL_MAP=[
    {label:'Jul/24',mes:7,ano:2024,col:15},{label:'Ago/24',mes:8,ano:2024,col:16},{label:'Set/24',mes:9,ano:2024,col:17},
    {label:'Out/24',mes:10,ano:2024,col:18},{label:'Nov/24',mes:11,ano:2024,col:19},{label:'Dez/24',mes:12,ano:2024,col:20},
    {label:'Jan/25',mes:1,ano:2025,col:22},{label:'Fev/25',mes:2,ano:2025,col:23},{label:'Mar/25',mes:3,ano:2025,col:24},
    {label:'Abr/25',mes:4,ano:2025,col:25},{label:'Mai/25',mes:5,ano:2025,col:26},{label:'Jun/25',mes:6,ano:2025,col:27},
    {label:'Jul/25',mes:7,ano:2025,col:28},{label:'Ago/25',mes:8,ano:2025,col:29},{label:'Set/25',mes:9,ano:2025,col:30},
    {label:'Out/25',mes:10,ano:2025,col:31},{label:'Nov/25',mes:11,ano:2025,col:32},{label:'Dez/25',mes:12,ano:2025,col:33},
    {label:'Jan/26',mes:1,ano:2026,col:35},{label:'Fev/26',mes:2,ano:2026,col:36},{label:'Mar/26',mes:3,ano:2026,col:37},
    {label:'Abr/26',mes:4,ano:2026,col:38},{label:'Mai/26',mes:5,ano:2026,col:39},{label:'Jun/26',mes:6,ano:2026,col:40},
    {label:'Jul/26',mes:7,ano:2026,col:41},{label:'Ago/26',mes:8,ano:2026,col:42},{label:'Set/26',mes:9,ano:2026,col:43},
    {label:'Out/26',mes:10,ano:2026,col:44},{label:'Nov/26',mes:11,ano:2026,col:45},{label:'Dez/26',mes:12,ano:2026,col:46},
  ];
  const monthly=[];
  for(const m of COL_MAP){
    const brutoMen=n(rows[13]?.[m.col]),acumBruto=n(rows[14]?.[m.col]),desconto=n(rows[20]?.[m.col]),liqMen=n(rows[22]?.[m.col]),acumLiq=n(rows[23]?.[m.col]);
    if(acumBruto<=0&&acumLiq<=0) continue;
    const pct=acumBruto>0&&brutoMen>0?(brutoMen/(acumBruto-brutoMen))*100:0;
    monthly.push({...m,brutoMen,acumBruto,desconto:Math.abs(desconto),liqMen,acumLiq,pct});
  }
  const aportes=[];
  daily.forEach(d=>{
    if(d.obs.toLowerCase().includes('aporte')){
      const m=d.obs.match(/r\$\s*([\d.,]+)/i);
      if(m){const val=parseFloat(m[1].replace(/\./g,'').replace(',','.'));if(!isNaN(val)&&val>0)aportes.push({data:d.data,valor:val,obs:d.obs});}
    }
  });
  const totalAportado=aportes.reduce((s,a)=>s+a.valor,0)||daily[0]?.saldo||0;
  return {daily,monthly,totalAportado,aportes};
}

//  RENDER DAY TRADE
// ════════════════════════════════════════════════════════════════════
function renderDayTrade(payload, uploadedAt) {
  const {daily,monthly,totalAportado,aportes} = payload;
  const ultimo      = monthly[monthly.length-1];
  const saldoBruto  = ultimo.acumBruto;
  const saldoLiq    = ultimo.acumLiq;
  const lucroLiq    = saldoLiq - totalAportado;
  const pctLiqTotal = totalAportado>0?(lucroLiq/totalAportado)*100:0;
  const diasUteis   = daily.filter(d=>d.taxa>0);
  const semana      = diasUteis.slice(-5);
  const rendSemBruto= semana.reduce((s,d)=>s+d.financeiro,0);
  const diasUteisUltMes=daily.filter(d=>d.mes===ultimo.mes&&d.ano===ultimo.ano&&d.taxa>0).length||1;
  const irDia       = ultimo.desconto/diasUteisUltMes;
  const rendSemLiq  = rendSemBruto-(irDia*semana.length);
  const saldoIniSem = semana.length>0?semana[0].saldo-semana[0].financeiro:saldoBruto;
  const pctSem      = saldoIniSem>0?(rendSemLiq/saldoIniSem)*100:0;
  const taxaMedia   = diasUteis.length>0?diasUteis.reduce((s,d)=>s+d.taxa,0)/diasUteis.length*100:0;
  const upDate      = uploadedAt?new Date(uploadedAt).toLocaleString('pt-BR'):'';

  const el = document.getElementById('tab-daytrade');
  el.innerHTML = `
    <div class="tab-header">
      <div>
        <h2>Day Trade — Alto Rendimento</h2>
        <p class="sub">Atualizado: ${upDate} · ${daily.length} dias · ${monthly.length} meses</p>
      </div>
      <button class="btn-outline" id="btnNovaPlani">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Nova planilha
      </button>
    </div>
    <div class="metrics">
      <div class="mc bruto-card"><div class="ml">Saldo bruto</div><div class="mv neutral">${fmt(saldoBruto)}</div><div class="ms muted">antes do IR</div></div>
      <div class="mc"><div class="ml">Saldo líquido</div><div class="mv green">${fmt(saldoLiq)}</div><div class="ms muted">aportado: ${fmt(totalAportado)}</div></div>
      <div class="mc"><div class="ml">Lucro líquido total</div><div class="mv green">${fmt(lucroLiq)}</div><div class="ms green">${fmtP(pctLiqTotal)} sobre aportado</div></div>
      <div class="mc"><div class="ml">Semana (líq.)</div><div class="mv ${rendSemLiq>=0?'green':'red'}">${fmt(rendSemLiq)}</div><div class="ms ${pctSem>=0?'green':'red'}">${fmtP(pctSem)}</div></div>
      <div class="mc"><div class="ml">${ultimo.label} líq.</div><div class="mv ${ultimo.liqMen>=0?'green':'red'}">${fmt(ultimo.liqMen)}</div><div class="ms muted">IR: ${fmt(ultimo.desconto)}</div></div>
      <div class="mc"><div class="ml">Taxa média/dia</div><div class="mv amber">${taxaMedia.toFixed(4)}%</div><div class="ms muted">${diasUteis.length} dias úteis</div></div>
    </div>
    <div class="charts-row">
      <div class="card span2">
        <div class="card-header">
          <span class="card-title">Evolução do acumulado líquido</span>
          <div class="tabs" id="tabsHist">
            <button class="tab active" data-p="all">Tudo</button>
            <button class="tab" data-p="2024">2024</button>
            <button class="tab" data-p="2025">2025</button>
            <button class="tab" data-p="2026">2026</button>
          </div>
        </div>
        <div class="cw h240"><canvas id="histChart"></canvas></div>
      </div>
      <div class="card"><div class="card-title">Rendimento mensal líquido (R$)</div><div class="cw h200"><canvas id="rendChart"></canvas></div></div>
      <div class="card"><div class="card-title">Desconto IR mensal (R$)</div><div class="cw h200"><canvas id="irChart"></canvas></div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Taxa diária — últimos 90 dias úteis</div>
      <div class="cw h130"><canvas id="dailyChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Histórico mensal completo</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Mês</th><th>Rend. Bruto</th><th>Acum. Bruto</th><th>Desconto IR</th><th>Rend. Líq.</th><th>Acum. Líq.</th><th>%</th></tr></thead>
          <tbody id="tBodyDT"></tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('btnNovaPlani').onclick = () => showUpload(true);
  document.querySelectorAll('#tabsHist .tab').forEach(b=>{
    b.addEventListener('click',function(){
      document.querySelectorAll('#tabsHist .tab').forEach(t=>t.classList.remove('active'));
      this.classList.add('active'); buildHist(this.dataset.p,monthly);
    });
  });

  const tbody=document.getElementById('tBodyDT');
  [...monthly].reverse().forEach(d=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong>${d.label}</strong></td><td class="muted">${fmt(d.brutoMen)}</td><td class="muted">${fmt(d.acumBruto)}</td><td class="red">-${fmt(d.desconto)}</td><td class="green">${fmt(d.liqMen)}</td><td class="green"><strong>${fmt(d.acumLiq)}</strong></td><td><span class="badge ${d.pct>=0?'bp':'bn'}">${fmtP(d.pct)}</span></td>`;
    tbody.appendChild(tr);
  });

  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
  const tc=isDark?'#999':'#666';
  buildHist('all',monthly,gc,tc);

  destroyChart('rendChart');
  charts['rendChart']=new Chart(document.getElementById('rendChart'),{type:'bar',data:{labels:monthly.map(d=>d.label),datasets:[{data:monthly.map(d=>d.liqMen),backgroundColor:monthly.map(d=>d.liqMen>=0?'rgba(16,185,129,.75)':'rgba(239,68,68,.75)'),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:9},maxTicksLimit:12}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>'R$'+(v/1000).toFixed(1)+'k'}}}}});

  destroyChart('irChart');
  charts['irChart']=new Chart(document.getElementById('irChart'),{type:'bar',data:{labels:monthly.map(d=>d.label),datasets:[{data:monthly.map(d=>d.desconto),backgroundColor:'rgba(239,68,68,.55)',borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:9},maxTicksLimit:12}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>'R$'+(v/1000).toFixed(1)+'k'}}}}});

  const diasRec=daily.filter(d=>d.taxa>0).slice(-90);
  destroyChart('dailyChart');
  charts['dailyChart']=new Chart(document.getElementById('dailyChart'),{type:'line',data:{labels:diasRec.map(d=>d.data),datasets:[{data:diasRec.map(d=>(d.taxa*100)),borderColor:'#f59e0b',borderWidth:1.5,pointRadius:0,backgroundColor:'rgba(245,158,11,.07)',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label,label:i=>i.raw.toFixed(4)+'%'}}},scales:{x:{display:false},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v.toFixed(3)+'%'}}}}});
}

function buildHist(p,monthly,gc,tc){
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const g=gc||(isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)');
  const t=tc||(isDark?'#999':'#666');
  const data=p==='all'?monthly:monthly.filter(d=>String(d.ano)===p);
  destroyChart('histChart');
  charts['histChart']=new Chart(document.getElementById('histChart'),{type:'line',data:{labels:data.map(d=>d.label),datasets:[{label:'Acumulado Líquido',data:data.map(d=>d.acumLiq),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.09)',fill:true,tension:.4,pointRadius:3,borderWidth:2,pointBackgroundColor:'#10b981'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:t,font:{size:10},maxTicksLimit:12}},y:{grid:{color:g},ticks:{color:t,font:{size:10},callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});
}

const TIPO_COLORS = {
  'Ação':     '#3b82f6', 'FII': '#10b981', 'ETF': '#f59e0b',
  'CDB':      '#8b5cf6', 'Tesouro': '#06b6d4', 'Cripto': '#f97316', 'Outro': '#94a3b8'
};
const TIPO_OPTIONS = ['Ação','FII','ETF','CDB','Tesouro','Cripto','Outro'];

let carteira = []; // [{id, ticker, nome, tipo, corretora, qtd, precoMedio, precoAtual, atualizadoEm}]
let carteiraEditId = null;

async function loadCarteira() {
  const snap = await getDoc(doc(db,'investimentos','carteira'));
  if(snap.exists()) carteira = snap.data().ativos || [];
  else carteira = [];
}

async function saveCarteira() {
  await setDoc(doc(db,'investimentos','carteira'),{ativos:carteira, updatedAt:Date.now()});
}

// Busca preço via brapi.dev (gratuita, sem auth para B3)
async function fetchPrice(ticker) {
  try {
    // Tenta brapi.dev primeiro
    const r = await fetch(`https://brapi.dev/api/quote/${ticker}?token=demo`);
    const d = await r.json();
    if(d.results && d.results[0] && d.results[0].regularMarketPrice) {
      return { price: d.results[0].regularMarketPrice, change: d.results[0].regularMarketChangePercent||0, name: d.results[0].longName||ticker };
    }
  } catch(e){}
  return null;
}

async function refreshPrices() {
  const btn = document.getElementById('btnRefresh');
  if(btn) { btn.disabled=true; btn.textContent='Atualizando...'; }
  let updated = 0;
  for(let i=0; i<carteira.length; i++){
    const at = carteira[i];
    if(['Ação','FII','ETF'].includes(at.tipo)) {
      const p = await fetchPrice(at.ticker);
      if(p) { carteira[i].precoAtual=p.price; carteira[i].changeDay=p.change; carteira[i].atualizadoEm=Date.now(); updated++; }
    }
  }
  if(updated>0) await saveCarteira();
  renderCarteira();
  if(btn) { btn.disabled=false; btn.textContent='↻ Atualizar preços'; }
}

function renderCarteira() {
  const el = document.getElementById('tab-carteira');

  // Totais
  const totalInvestido = carteira.reduce((s,a)=>s+(a.qtd*a.precoMedio),0);
  const totalAtual     = carteira.reduce((s,a)=>s+(a.qtd*(a.precoAtual||a.precoMedio)),0);
  const lucroTotal     = totalAtual - totalInvestido;
  const pctTotal       = totalInvestido>0?(lucroTotal/totalInvestido)*100:0;

  // Por tipo
  const porTipo = {};
  carteira.forEach(a=>{
    const val = a.qtd*(a.precoAtual||a.precoMedio);
    porTipo[a.tipo]=(porTipo[a.tipo]||0)+val;
  });

  // Por corretora
  const porCorretora = {};
  carteira.forEach(a=>{
    const val = a.qtd*(a.precoAtual||a.precoMedio);
    const cor = a.corretora||'Não informada';
    porCorretora[cor]=(porCorretora[cor]||0)+val;
  });

  el.innerHTML = `
    <div class="tab-header">
      <div><h2>Carteira de Investimentos</h2><p class="sub">${carteira.length} ativos cadastrados</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-outline" id="btnRefresh">↻ Atualizar preços</button>
        <button class="btn-primary" id="btnAddAtivo">+ Adicionar ativo</button>
      </div>
    </div>

    <div class="metrics">
      <div class="mc"><div class="ml">Total investido</div><div class="mv neutral">${fmt(totalInvestido)}</div><div class="ms muted">preço médio</div></div>
      <div class="mc"><div class="ml">Valor atual</div><div class="mv ${totalAtual>=totalInvestido?'green':'red'}">${fmt(totalAtual)}</div><div class="ms muted">a mercado</div></div>
      <div class="mc"><div class="ml">Lucro / Prejuízo</div><div class="mv ${lucroTotal>=0?'green':'red'}">${fmt(lucroTotal)}</div><div class="ms ${pctTotal>=0?'green':'red'}">${fmtP(pctTotal)}</div></div>
      <div class="mc"><div class="ml">Nº de ativos</div><div class="mv neutral">${carteira.length}</div><div class="ms muted">${Object.keys(porTipo).join(' · ')||'—'}</div></div>
    </div>

    ${carteira.length>0?`
    <div class="charts-row" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Alocação por tipo</div>
        <div class="cw h200"><canvas id="pieChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Alocação por corretora</div>
        <div class="cw h200"><canvas id="pieCorretora"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Lucro por ativo (%)</div>
        <div class="cw h200"><canvas id="barAtivos"></canvas></div>
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-title">Meus ativos</div>
      ${carteira.length===0?`<div style="text-align:center;padding:2rem;color:var(--muted)">
        <p style="font-size:32px;margin-bottom:.5rem">📊</p>
        <p>Nenhum ativo cadastrado ainda.</p>
        <p style="font-size:12px;margin-top:.25rem">Clique em "+ Adicionar ativo" para começar.</p>
      </div>`:`
      <div class="table-wrap">
        <table>
          <thead><tr><th>Ativo</th><th>Tipo</th><th>Corretora</th><th>Qtd</th><th>P. Médio</th><th>P. Atual</th><th>Total invest.</th><th>Valor atual</th><th>Lucro R$</th><th>Lucro %</th><th>Dia</th><th></th></tr></thead>
          <tbody id="tBodyCarteira"></tbody>
        </table>
      </div>`}
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Adicionar ativo</h3>
          <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group span2">
              <label>Ticker / Código</label>
              <input id="f_ticker" placeholder="ex: ITUB4, XPML11, BTC" style="text-transform:uppercase">

            </div>
            <div class="form-group">
              <label>Corretora</label>
              <input id="f_corretora" placeholder="ex: Rico, Agora, XP">

            <div class="form-group">

              <input id="f_qtd" type="number" placeholder="ex: 100" min="0" step="0.01">

            </div>
            <div class="form-group">
              <label>Preço atual (R$) <span style="font-size:10px;color:var(--muted)">(opcional — será buscado auto)</span></label>
              <input id="f_atual" type="number" placeholder="ex: 31.20" min="0" step="0.01">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="btnCancelar">Cancelar</button>
          <button class="btn-primary" id="btnSalvarAtivo">Salvar</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('btnAddAtivo').onclick = () => openModal(null);
  document.getElementById('btnRefresh').onclick  = refreshPrices;
  document.getElementById('modalClose').onclick  = closeModal;
  document.getElementById('btnCancelar').onclick = closeModal;
  document.getElementById('modalOverlay').onclick = e => { if(e.target===e.currentTarget) closeModal(); };
  document.getElementById('btnSalvarAtivo').onclick = salvarAtivo;

  // Tabela de ativos
  if(carteira.length>0){
    const tbody = document.getElementById('tBodyCarteira');
    carteira.forEach(a=>{
      const inv    = a.qtd * a.precoMedio;
      const atual  = a.qtd * (a.precoAtual||a.precoMedio);
      const lucro  = atual - inv;
      const pct    = inv>0?(lucro/inv)*100:0;
      const chDay  = a.changeDay||0;
      const upAt   = a.atualizadoEm ? new Date(a.atualizadoEm).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '—';
      const tr     = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${a.ticker}</strong><br><span class="seg">${a.nome||''}</span></td>
        <td><span class="tipo-badge" style="background:${TIPO_COLORS[a.tipo]||'#94a3b8'}20;color:${TIPO_COLORS[a.tipo]||'#94a3b8'}">${a.tipo}</span></td>
        <td class="muted">${a.corretora||'—'}</td>
        <td>${a.qtd}</td>
        <td class="muted">${fmt(a.precoMedio)}</td>
        <td>${a.precoAtual?fmt(a.precoAtual):'<span class="muted">—</span>'}<br><span class="seg muted">${upAt}</span></td>
        <td class="muted">${fmt(inv)}</td>
        <td class="${atual>=inv?'green':'red'}">${fmt(atual)}</td>
        <td class="${lucro>=0?'green':'red'}">${fmt(lucro)}</td>
        <td><span class="badge ${pct>=0?'bp':'bn'}">${fmtP(pct)}</span></td>
        <td class="${chDay>=0?'green':'red'}" style="font-size:12px">${chDay?fmtP(chDay):'—'}</td>
        <td style="white-space:nowrap">
          <button class="btn-icon" data-id="${a.id}" data-action="edit">✎</button>
          <button class="btn-icon danger" data-id="${a.id}" data-action="del">✕</button>
        </td>`;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('[data-action="edit"]').forEach(b=>b.onclick=()=>openModal(b.dataset.id));
    tbody.querySelectorAll('[data-action="del"]').forEach(b=>b.onclick=()=>deletarAtivo(b.dataset.id));

    // Gráficos
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const gc=isDark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
    const tc=isDark?'#999':'#666';
    const tipoKeys=Object.keys(porTipo);
    const corKeys=Object.keys(porCorretora);

    destroyChart('pieChart');
    charts['pieChart']=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:tipoKeys,datasets:[{data:tipoKeys.map(k=>porTipo[k]),backgroundColor:tipoKeys.map(k=>TIPO_COLORS[k]||'#94a3b8'),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},boxWidth:12}}}}});

    destroyChart('pieCorretora');
    const corColors=['#3b82f6','#10b981','#f59e0b','#8b5cf6','#f97316','#06b6d4'];
    charts['pieCorretora']=new Chart(document.getElementById('pieCorretora'),{type:'doughnut',data:{labels:corKeys,datasets:[{data:corKeys.map(k=>porCorretora[k]),backgroundColor:corKeys.map((_,i)=>corColors[i%corColors.length]),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},boxWidth:12}}}}});

    const ativosOrdenados=[...carteira].sort((a,b)=>{
      const pa=a.qtd*a.precoMedio,pb=b.qtd*b.precoMedio;
      const la=a.qtd*(a.precoAtual||a.precoMedio)-pa, lb=b.qtd*(b.precoAtual||b.precoMedio)-pb;
      const pctA=pa>0?(la/pa)*100:0, pctB=pb>0?(lb/pb)*100:0;
      return pctB-pctA;
    });
    destroyChart('barAtivos');
    charts['barAtivos']=new Chart(document.getElementById('barAtivos'),{type:'bar',data:{labels:ativosOrdenados.map(a=>a.ticker),datasets:[{data:ativosOrdenados.map(a=>{const inv=a.qtd*a.precoMedio,at=a.qtd*(a.precoAtual||a.precoMedio);return inv>0?((at-inv)/inv)*100:0;}),backgroundColor:ativosOrdenados.map(a=>{const inv=a.qtd*a.precoMedio,at=a.qtd*(a.precoAtual||a.precoMedio);return at>=inv?'rgba(16,185,129,.75)':'rgba(239,68,68,.75)';}),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:10}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v.toFixed(1)+'%'}}}}});
  }
}

function openModal(id) {
  carteiraEditId = id;
  document.getElementById('modalTitle').textContent = id ? 'Editar ativo' : 'Adicionar ativo';
  if(id) {
    const a = carteira.find(x=>x.id===id);
    if(a){
      document.getElementById('f_ticker').value    = a.ticker||'';
      document.getElementById('f_nome').value      = a.nome||'';
      document.getElementById('f_tipo').value      = a.tipo||'Ação';
      document.getElementById('f_corretora').value = a.corretora||'';
      document.getElementById('f_qtd').value       = a.qtd||'';
      document.getElementById('f_preco').value     = a.precoMedio||'';
      document.getElementById('f_atual').value     = a.precoAtual||'';
    }
  } else {
    ['f_ticker','f_nome','f_corretora','f_qtd','f_preco','f_atual'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f_tipo').value='Ação';
  }
  document.getElementById('modalOverlay').style.display='flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display='none'; }

async function salvarAtivo() {
  const ticker    = document.getElementById('f_ticker').value.trim().toUpperCase();
  const nome      = document.getElementById('f_nome').value.trim();
  const tipo      = document.getElementById('f_tipo').value;
  const corretora = document.getElementById('f_corretora').value.trim();
  const qtd       = parseFloat(document.getElementById('f_qtd').value);
  const preco     = parseFloat(document.getElementById('f_preco').value);
  const atual     = parseFloat(document.getElementById('f_atual').value)||0;
  if(!ticker||isNaN(qtd)||isNaN(preco)){ alert('Preencha ticker, quantidade e preço médio.'); return; }
  const btn=document.getElementById('btnSalvarAtivo');
  btn.disabled=true; btn.textContent='Salvando...';
  let precoAtual = atual||0;
  if(!precoAtual && ['Ação','FII','ETF'].includes(tipo)) {
    const p = await fetchPrice(ticker);
    if(p) precoAtual = p.price;
  }
  if(carteiraEditId) {
    const idx=carteira.findIndex(x=>x.id===carteiraEditId);
    if(idx>=0) carteira[idx]={...carteira[idx],ticker,nome,tipo,corretora,qtd,precoMedio:preco,precoAtual:precoAtual||preco};
  } else {
    carteira.push({id:Date.now().toString(),ticker,nome,tipo,corretora,qtd,precoMedio:preco,precoAtual:precoAtual||preco,atualizadoEm:Date.now()});
  }
  await saveCarteira();
  closeModal();
  renderCarteira();
  btn.disabled=false; btn.textContent='Salvar';
}

async function deletarAtivo(id) {
  if(!confirm('Remover este ativo?')) return;
  carteira=carteira.filter(a=>a.id!==id);
  await saveCarteira();
  renderCarteira();
}

// ════════════════════════════════════════════════════════════════════
//  UPLOAD / STATUS
// ════════════════════════════════════════════════════════════════════
function showUpload(show) {
  document.getElementById('upload-overlay').style.display = show ? 'flex' : 'none';
  if(!show) document.getElementById('main-app').style.display='block';
}

function setStatus(msg) { const el=document.getElementById('upload-status'); if(el) el.textContent=msg; }

window.handleFile = async function(e) {
  const file=e.target.files[0]; if(!file) return;
  setStatus('Lendo arquivo...');
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:false});
      const payload=parseSheet(wb);
      if(!payload||!payload.daily.length){ setStatus('Erro: não foi possível ler os dados. Verifique se é a planilha correta (aba "Resultados").'); return; }
      setStatus(`Salvando ${payload.daily.length} registros...`);
      await setDoc(doc(db,'investimentos','dashboard'),{payload,updatedAt:Date.now()});
      setStatus('✓ Atualizado com sucesso!');
      showUpload(false);
    }catch(err){ setStatus('Erro: '+err.message); }
  };
  reader.readAsBinaryString(file);
};

window.handleDrop=function(e){
  e.preventDefault(); document.getElementById('dropzone').classList.remove('drag');
  const file=e.dataTransfer.files[0]; if(file) window.handleFile({target:{files:[file]}});
};

// ════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Carrega carteira imediatamente
  await loadCarteira();

  // Escuta day trade em tempo real
  onSnapshot(doc(db,'investimentos','dashboard'), snap => {
    document.getElementById('main-app').style.display='block';
    showUpload(false);
    if(snap.exists()){
      const d=snap.data();
      if(d.payload) renderDayTrade(d.payload,d.updatedAt);
      else { document.getElementById('tab-daytrade').innerHTML='<div style="text-align:center;padding:3rem;color:var(--muted)"><p style="font-size:32px">📂</p><p>Faça upload da planilha para visualizar o day trade.</p></div>'; }
    } else {
      showUpload(true);
    }
  }, err => { showUpload(true); setStatus('Erro: '+err.message); });

  // Escuta carteira em tempo real
  onSnapshot(doc(db,'investimentos','carteira'), snap => {
    if(snap.exists()) { carteira=snap.data().ativos||[]; if(activeTab==='carteira') renderCarteira(); }
  });

  // Render inicial da carteira
  renderCarteira();

  // Tabs
  document.querySelectorAll('.nav-tab').forEach(t=>{
    t.addEventListener('click',()=>{ switchTab(t.dataset.tab); if(t.dataset.tab==='carteira') renderCarteira(); });
  });
});
</script>
<style>
:root{--bg:#f1f5f9;--surf:#fff;--surf2:#f8fafc;--bdr:#e2e8f0;--txt:#0f172a;--muted:#64748b;--green:#059669;--red:#dc2626;--amber:#b45309;--blue:#2563eb}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surf:#1e293b;--surf2:#0f172a;--bdr:#334155;--txt:#f1f5f9;--muted:#94a3b8;--green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* UPLOAD OVERLAY */
#upload-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;padding:1.5rem}
.upload-box{background:var(--surf);border:1.5px dashed var(--bdr);border-radius:16px;padding:2.5rem 2rem;text-align:center;max-width:500px;width:100%;transition:border-color .2s}
.upload-box.drag{border-color:var(--blue);background:rgba(37,99,235,.04)}
.upload-box h2{font-size:17px;font-weight:700;margin-bottom:.4rem}
.upload-box p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
.upload-box input{display:none}
#upload-status{font-size:13px;color:var(--muted);text-align:center;max-width:500px}

/* MAIN APP */
#main-app{display:none;min-height:100vh}

/* NAVBAR */
.navbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 1.25rem;display:flex;align-items:center;gap:1.5rem;height:52px;position:sticky;top:0;z-index:50}
.navbar-brand{font-size:14px;font-weight:700;color:var(--txt);white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.nav-tab{font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,color .15s}
.nav-tab:hover{background:var(--surf2);color:var(--txt)}
.nav-tab.active{background:var(--surf2);color:var(--txt)}
.nav-tab .dot{width:7px;height:7px;border-radius:50%}

/* CONTENT */
.content{padding:1.25rem;max-width:1300px;margin:0 auto}
.tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.tab-header h2{font-size:18px;font-weight:700}
.tab-header .sub{font-size:11px;color:var(--muted);margin-top:3px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:.9rem 1rem}
.bruto-card{border-left:3px solid #94a3b8}
.ml{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.mv{font-size:19px;font-weight:700}.ms{font-size:11px;margin-top:3px}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.muted{color:var(--muted)}.neutral{color:var(--txt)}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:.5rem}
.card-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px}
.charts-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:0}
.charts-row .span2{grid-column:1/-1}
@media(max-width:900px){.charts-row{grid-template-columns:1fr}.charts-row .span2{grid-column:auto}}
.cw{position:relative}.h240{height:240px}.h200{height:200px}.h130{height:130px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt);font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:var(--bdr)}
.btn-outline{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt);font-size:12px;cursor:pointer;font-weight:500}
.btn-outline:hover{background:var(--surf2)}
.btn-primary{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary:hover{opacity:.9}
.btn-icon{padding:4px 8px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;margin-left:2px}
.btn-icon:hover{background:var(--surf2);color:var(--txt)}
.btn-icon.danger:hover{background:#fee2e2;color:var(--red);border-color:#fca5a5}

/* TABS */
.tabs{display:flex;gap:4px}
.tab{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;background:transparent;border:1px solid var(--bdr);color:var(--muted);font-weight:500}
.tab.active{background:var(--surf2);color:var(--txt);border-color:var(--txt)}

/* TABLE */
.table-wrap{overflow-x:auto;max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;background:var(--surf);z-index:1}
thead tr{border-bottom:2px solid var(--bdr)}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.bp{background:#dcfce7;color:#166534}.bn{background:#fee2e2;color:#991b1b}
@media(prefers-color-scheme:dark){.bp{background:#14532d;color:#86efac}.bn{background:#7f1d1d;color:#fca5a5}}
.tipo-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.seg{font-size:11px;color:var(--muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surf);border-radius:16px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.25rem;border-bottom:1px solid var(--bdr)}
.modal-header h3{font-size:15px;font-weight:700}
.modal-close{background:transparent;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:1.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:1rem 1.25rem;border-top:1px solid var(--bdr)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span2{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:var(--muted)}
.form-group input,.form-group select{padding:8px 10px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt);font-size:13px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--blue)}
.form-hint{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<!-- UPLOAD OVERLAY -->
<div id="upload-overlay">
  <div class="upload-box" id="dropzone"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" style="margin-bottom:.9rem"><path d="M9 17H7A5 5 0 017 7h.5M15 17h2A5 5 0 0017 7h-.5M12 12v9M9 18l3 3 3-3"/></svg>
    <h2>Dashboard de Investimentos</h2>
    <p>Faça o upload da planilha do day trade para começar.<br>A carteira de ativos é gerenciada diretamente na ferramenta.</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
    <button class="btn" onclick="document.getElementById('fileInput').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Escolher planilha
    </button>
  </div>
  <p id="upload-status">Conectando ao servidor...</p>
</div>

<!-- MAIN APP -->
<div id="main-app">
  <nav class="navbar">
    <span class="navbar-brand">📊 Investimentos</span>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="daytrade">
        <span class="dot" style="background:#f59e0b"></span> Day Trade
      </button>
      <button class="nav-tab" data-tab="carteira">
        <span class="dot" style="background:#3b82f6"></span> Carteira
      </button>

</body>
</html>
