<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Investimentos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#f1f5f9;--surf:#fff;--surf2:#f8fafc;--bdr:#e2e8f0;--txt:#0f172a;--muted:#64748b;--green:#059669;--red:#dc2626;--amber:#b45309;--blue:#2563eb;--purple:#7c3aed}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surf:#1e293b;--surf2:#0f172a;--bdr:#334155;--txt:#f1f5f9;--muted:#94a3b8;--green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
#upload-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;padding:1.5rem}
.upload-box{background:var(--surf);border:1.5px dashed var(--bdr);border-radius:16px;padding:2.5rem 2rem;text-align:center;max-width:490px;width:100%;transition:border-color .2s}
.upload-box.drag{border-color:var(--blue);background:rgba(37,99,235,.04)}
.upload-box h2{font-size:17px;font-weight:700;margin-bottom:.4rem}
.upload-box p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6}
.upload-box input{display:none}
#upload-status{font-size:13px;color:var(--muted);text-align:center;max-width:490px;min-height:20px}
#main-app{display:none;min-height:100vh}
.navbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 1.25rem;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:50;overflow:visible}
.navbar-brand{font-size:14px;font-weight:700;margin-right:8px;white-space:nowrap}
.nav-tab{font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.nav-tab:hover,.nav-tab.active{background:var(--surf2);color:var(--txt)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-dropdown{position:relative}
.dd-btn{font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s}
.dd-btn:hover,.dd-btn.active{background:var(--surf2);color:var(--txt)}
.dd-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--surf);border:1px solid var(--bdr);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);min-width:220px;padding:6px;z-index:200;display:none}
.dd-menu.open{display:block}
.dd-item{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:var(--txt);font-size:13px;cursor:pointer;text-align:left;transition:background .1s}
.dd-item:hover{background:var(--surf2)}
.dd-item.active{background:var(--surf2);font-weight:600}
.dd-count{margin-left:auto;font-size:11px;color:var(--muted)}
.dd-sep{border-top:1px solid var(--bdr);margin:4px 0}
.content{padding:1.25rem;max-width:1300px;margin:0 auto}
.tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.tab-header h2{font-size:18px;font-weight:700}
.tab-header .sub{font-size:11px;color:var(--muted);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem}
.mc{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:.9rem 1rem}
.mc.bruto{border-left:3px solid #94a3b8}
.ml{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.mv{font-size:19px;font-weight:700}.ms{font-size:11px;margin-top:3px}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.muted{color:var(--muted)}.neutral{color:var(--txt)}.purple{color:var(--purple)}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:.5rem}
.card-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.span2{grid-column:1/-1}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}.span2{grid-column:auto}}
.cw{position:relative}.h240{height:240px}.h200{height:200px}.h180{height:180px}.h130{height:130px}.h160{height:160px}
.tabs{display:flex;gap:4px}
.ctab{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;background:transparent;border:1px solid var(--bdr);color:var(--muted);font-weight:500}
.ctab.active{background:var(--surf2);color:var(--txt);border-color:var(--txt)}
.table-wrap{overflow-x:auto;max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;background:var(--surf);z-index:1}
thead tr{border-bottom:2px solid var(--bdr)}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.bp{background:#dcfce7;color:#166534}.bn{background:#fee2e2;color:#991b1b}
.bpurple{background:#ede9fe;color:#5b21b6}
@media(prefers-color-scheme:dark){.bp{background:#14532d;color:#86efac}.bn{background:#7f1d1d;color:#fca5a5}.bpurple{background:#2e1065;color:#c4b5fd}}
.tipo-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.perfil-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.seg{font-size:11px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt);font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:var(--bdr)}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt);font-size:12px;cursor:pointer;font-weight:500}
.btn-sm:hover{background:var(--surf2)}
.btn-primary{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary:hover{opacity:.9}
.btn-ghost{padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
.btn-ghost:hover{background:var(--surf2);color:var(--txt)}
.btn-icon{padding:4px 8px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;margin-left:2px}
.btn-icon:hover{background:var(--surf2);color:var(--txt)}
.btn-icon.del:hover{background:#fee2e2;color:var(--red);border-color:#fca5a5}
/* META */
.meta-bar-bg{height:10px;background:var(--surf2);border-radius:20px;overflow:hidden;margin:8px 0 4px}
.meta-bar-fill{height:100%;border-radius:20px;transition:width .6s ease;background:linear-gradient(90deg,var(--blue),var(--purple))}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border-radius:16px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.25rem;border-bottom:1px solid var(--bdr)}
.modal-head h3{font-size:15px;font-weight:700}
.modal-sub{font-size:11px;color:var(--muted);margin-top:2px}
.modal-body{padding:1.25rem}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:1rem 1.25rem;border-top:1px solid var(--bdr)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .s2{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:12px;font-weight:600;color:var(--muted)}
.fl input,.fl select{padding:8px 10px;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);color:var(--txt);font-size:13px;outline:none}
.fl input:focus,.fl select:focus{border-color:var(--blue)}
.fhint{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:2.5rem;color:var(--muted)}
.fn{font-size:11px;color:var(--muted);text-align:center;padding:.75rem 0 .25rem;display:flex;align-items:center;justify-content:center;gap:5px}
/* AUTO UPDATE BADGE */
.auto-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#dcfce7;color:#166534;font-weight:600;margin-left:6px}
@media(prefers-color-scheme:dark){.auto-badge{background:#14532d;color:#86efac}}
/* DIV CARD */
.div-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--bdr);font-size:13px}
.div-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div id="upload-overlay">
  <div class="upload-box" id="dropzone"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="APP.drop(event)">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" style="margin-bottom:.9rem"><path d="M9 17H7A5 5 0 017 7h.5M15 17h2A5 5 0 0017 7h-.5M12 12v9M9 18l3 3 3-3"/></svg>
    <h2>Dashboard de Investimentos</h2>
    <p>Faça o upload da planilha do trade para começar.<br>As carteiras são gerenciadas diretamente na ferramenta.</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="APP.upload(event)">
    <button class="btn" onclick="document.getElementById('fileInput').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Escolher planilha
    </button>
  </div>
  <p id="upload-status">Carregando...</p>
</div>

<div id="main-app">
  <nav class="navbar">
    <span class="navbar-brand">📊 Investimentos</span>
    <div id="nav-tabs" style="display:flex;align-items:center;gap:4px"></div>
  </nav>
  <div class="content" id="content"></div>
</div>

<!-- MODAL ATIVO -->
<div class="modal-bg" id="modalAtivo" onclick="if(event.target===this)CART.closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div><h3 id="mAtivoTitle">Adicionar ativo</h3><div class="modal-sub" id="mAtivoSub"></div></div>
      <button class="btn-ghost" onclick="CART.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <div class="fl s2"><label>Ticker / Código</label><input id="fa_ticker" placeholder="ex: ITUB4, XPML11" style="text-transform:uppercase"><span class="fhint">Preço e dividendos buscados automaticamente para Ações, FIIs e ETFs.</span></div>
        <div class="fl"><label>Nome</label><input id="fa_nome" placeholder="ex: Itaú Unibanco"></div>
        <div class="fl"><label>Tipo</label><select id="fa_tipo"><option>Ação</option><option>FII</option><option>ETF</option><option>CDB</option><option>Tesouro</option><option>Cripto</option><option>Outro</option></select></div>
        <div class="fl"><label>Corretora</label><input id="fa_corretora" placeholder="ex: Rico, Agora"></div>
        <div class="fl"><label>Quantidade</label><input id="fa_qtd" type="number" min="0" step="0.01" placeholder="ex: 100"></div>
        <div class="fl"><label>Preço médio (R$)</label><input id="fa_preco" type="number" min="0" step="0.01" placeholder="ex: 28.50"></div>
        <div class="fl"><label>Preço atual (R$) <span style="font-weight:400;font-size:10px">opcional</span></label><input id="fa_atual" type="number" min="0" step="0.01" placeholder="buscado automaticamente"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm" onclick="CART.closeModal()">Cancelar</button>
      <button class="btn-primary" id="btnSalvarAtivo" onclick="CART.salvar()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL NOVO PERFIL -->
<div class="modal-bg" id="modalPerfil" onclick="if(event.target===this)CART.closePerfil()">
  <div class="modal">
    <div class="modal-head"><h3>Nova carteira</h3><button class="btn-ghost" onclick="CART.closePerfil()">✕</button></div>
    <div class="modal-body">
      <div class="fg">
        <div class="fl s2"><label>Nome da carteira</label><input id="fp_nome" placeholder="ex: Carteira João, Previdência..."></div>
        <div class="fl"><label>Cor</label><input type="color" id="fp_cor" value="#3b82f6" style="padding:4px;height:38px;width:100%;border-radius:8px;border:1px solid var(--bdr);background:var(--surf2);cursor:pointer"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm" onclick="CART.closePerfil()">Cancelar</button>
      <button class="btn-primary" onclick="CART.salvarPerfil()">Criar carteira</button>
    </div>
  </div>
</div>

<!-- MODAL META -->
<div class="modal-bg" id="modalMeta" onclick="if(event.target===this)closeMeta()">
  <div class="modal">
    <div class="modal-head"><h3>🎯 Definir meta de patrimônio</h3><button class="btn-ghost" onclick="closeMeta()">✕</button></div>
    <div class="modal-body">
      <div class="fg">
        <div class="fl s2"><label>Valor da meta (R$)</label><input id="meta_valor" type="number" min="0" placeholder="ex: 500000"></div>
        <div class="fl s2"><label>Data alvo</label><input id="meta_data" type="month"></div>
        <div class="fl s2"><label>Descrição (opcional)</label><input id="meta_desc" placeholder="ex: Aposentadoria, Imóvel..."></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-sm" onclick="closeMeta()">Cancelar</button>
      <button class="btn-primary" onclick="salvarMeta()">Salvar meta</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = initializeApp({
  apiKey:"AIzaSyCCqDt2L3lSEbKfbByigXpIDrMxHgNIxtA",
  authDomain:"investimentos-d4a38.firebaseapp.com",
  projectId:"investimentos-d4a38",
  storageBucket:"investimentos-d4a38.firebasestorage.app",
  messagingSenderId:"874496232831",
  appId:"1:874496232831:web:d1c44ea3ccc6b369971e4a"
});
const DB = getFirestore(FB);
const dbGet = id       => getDoc(doc(DB,'investimentos',id));
const dbSet = (id,data)=> setDoc(doc(DB,'investimentos',id),data);
const dbWatch=(id,cb)  => onSnapshot(doc(DB,'investimentos',id),cb);

// ── HELPERS ───────────────────────────────────────────────────
const fmt  = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = v => (v>=0?'+':'')+Number(v||0).toFixed(2)+'%';
const n    = v => (typeof v==='number'&&isFinite(v))?v:0;
const isDark  = ()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
const GC      = ()=>isDark()?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
const TC      = ()=>isDark()?'#999':'#666';
let CH={};
const destroyChart=id=>{if(CH[id]){CH[id].destroy();delete CH[id];}};

const TIPO_COLORS={Ação:'#3b82f6',FII:'#10b981',ETF:'#f59e0b',CDB:'#8b5cf6',Tesouro:'#06b6d4',Cripto:'#f97316',Outro:'#94a3b8'};
const PERFIL_CORES=['#3b82f6','#ec4899','#10b981','#f59e0b','#8b5cf6','#f97316'];

// ── ESTADO ────────────────────────────────────────────────────
let S={view:'trade',perfilAtivo:null,tradePayload:null,tradeUpdAt:null,perfis:[],meta:null};
let _autoUpdateTimer=null;

// ── BRAPI — preços + dividendos ───────────────────────────────
async function fetchQuote(ticker){
  try{
    const r=await fetch(`https://brapi.dev/api/quote/${ticker}?fundamental=false`);
    const d=await r.json();
    const q=d.results?.[0];
    if(q?.regularMarketPrice) return {price:q.regularMarketPrice,change:q.regularMarketChangePercent||0,name:q.longName||ticker};
  }catch(e){}
  return null;
}

async function fetchDividendos(ticker){
  try{
    const r=await fetch(`https://brapi.dev/api/quote/${ticker}?dividends=true`);
    const d=await r.json();
    const divs=d.results?.[0]?.dividendsData?.cashDividends||[];
    return divs.map(dv=>({
      data:dv.paymentDate||dv.approvedOn||'',
      valorPorCota:dv.rate||0,
      tipo:dv.label||'Dividendo'
    })).filter(dv=>dv.valorPorCota>0);
  }catch(e){}
  return [];
}

async function refreshAllPrecos(perfilId, silent=false){
  const perfil=S.perfis.find(p=>p.id===perfilId);
  if(!perfil) return;
  const btn=document.getElementById('btnRefresh');
  if(btn&&!silent){btn.disabled=true;btn.textContent='Atualizando...';}
  for(let i=0;i<(perfil.ativos||[]).length;i++){
    const a=perfil.ativos[i];
    if(['Ação','FII','ETF'].includes(a.tipo)){
      const q=await fetchQuote(a.ticker);
      if(q){perfil.ativos[i].precoAtual=q.price;perfil.ativos[i].changeDay=q.change;perfil.ativos[i].atualizadoEm=Date.now();}
    }
  }
  await dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()});
  if(S.view==='carteira'&&S.perfilAtivo===perfilId) CART.render(perfilId);
  if(btn&&!silent){btn.disabled=false;btn.textContent='↻ Atualizar preços';}
}

function startAutoUpdate(perfilId){
  if(_autoUpdateTimer) clearInterval(_autoUpdateTimer);
  _autoUpdateTimer=setInterval(()=>{
    if(S.view==='carteira') refreshAllPrecos(S.perfilAtivo,true);
  }, 60*60*1000); // a cada 1h
}

// ── NAV ───────────────────────────────────────────────────────
function buildNav(){
  const pa=S.perfis.find(p=>p.id===S.perfilAtivo);
  const el=document.getElementById('nav-tabs');
  const wasOpen=el.querySelector('.dd-menu.open');
  el.innerHTML=`
    <button class="nav-tab ${S.view==='trade'?'active':''}" onclick="APP.goTrade()">
      <span class="dot" style="background:#f59e0b"></span>Trade
    </button>
    <div class="nav-dropdown" id="navDrop">
      <button class="dd-btn ${S.view==='carteira'||S.view==='consolidado'?'active':''}" onclick="APP.toggleDD(event)">
        <span class="dot" style="background:${pa?.cor||'#3b82f6'}"></span>
        Carteira${pa&&S.view==='carteira'?' — '+pa.nome:''} <span style="font-size:10px">▾</span>
      </button>
      <div class="dd-menu" id="ddMenu">
        ${S.perfis.map(p=>`
          <button class="dd-item ${S.perfilAtivo===p.id&&S.view==='carteira'?'active':''}" onclick="APP.goPerfil('${p.id}')">
            <span class="dot" style="background:${p.cor}"></span>${p.nome}
            <span class="dd-count">${(p.ativos||[]).length} ativos</span>
          </button>`).join('')}
        <div class="dd-sep"></div>
        <button class="dd-item" onclick="CART.openPerfil()">＋ Nova carteira</button>
        ${S.perfis.length>0?`<div class="dd-sep"></div><button class="dd-item ${S.view==='consolidado'?'active':''}" onclick="APP.goConsolidado()">⊞ Visão consolidada</button>`:''}
      </div>
    </div>
  `;
  if(wasOpen){const m=document.getElementById('ddMenu');if(m)m.classList.add('open');}
}

// ── APP ───────────────────────────────────────────────────────
window.APP={
  toggleDD(e){e.stopPropagation();document.getElementById('ddMenu')?.classList.toggle('open');},
  closeDD(){document.getElementById('ddMenu')?.classList.remove('open');},
  goTrade(){S.view='trade';this.closeDD();buildNav();TRADE.render(S.tradePayload,S.tradeUpdAt);},
  goPerfil(id){S.view='carteira';S.perfilAtivo=id;this.closeDD();buildNav();CART.render(id);startAutoUpdate(id);},
  goConsolidado(){S.view='consolidado';this.closeDD();buildNav();CONS.render();},
  showMain(){document.getElementById('upload-overlay').style.display='none';document.getElementById('main-app').style.display='block';},
  showUpload(){document.getElementById('upload-overlay').style.display='flex';document.getElementById('main-app').style.display='none';},
  setStatus(msg){const el=document.getElementById('upload-status');if(el)el.textContent=msg;},
  drop(e){e.preventDefault();document.getElementById('dropzone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)this.upload({target:{files:[f]}});},
  async upload(e){
    const file=e.target.files[0];if(!file)return;
    this.setStatus('Lendo arquivo...');
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary',cellDates:false});
        const payload=parseSheet(wb);
        if(!payload||!payload.daily.length){this.setStatus('Erro: planilha não reconhecida.');return;}
        this.setStatus('Salvando na nuvem...');
        await dbSet('dashboard',{payload,updatedAt:Date.now()});
        this.setStatus('✓ Atualizado com sucesso!');
      }catch(err){this.setStatus('Erro: '+err.message);}
    };
    reader.readAsBinaryString(file);
  }
};

// ── PARSER ────────────────────────────────────────────────────
function parseSheet(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  let start=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(typeof r[0]==='number'&&r[0]>=1&&r[0]<=12&&typeof r[1]==='number'&&r[1]>=2020&&typeof r[11]==='number'&&r[11]>1000){start=i;break;}
  }
  if(start<0)return null;
  const daily=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i];
    if(typeof r[0]!=='number'||typeof r[11]!=='number'||r[11]<=0)continue;
    let ds='';
    if(r[5]){if(typeof r[5]==='number'){const d=new Date(Math.round((r[5]-25569)*86400*1000));ds=d.toISOString().split('T')[0];}else if(r[5] instanceof Date){ds=r[5].toISOString().split('T')[0];}else ds=String(r[5]).split('T')[0];}
    daily.push({mes:Math.round(r[0]),ano:Math.round(r[1]),data:ds,taxa:n(r[7]),financeiro:n(r[9]),saldo:n(r[11]),obs:r[12]?String(r[12]):''});
  }
  const CM=[
    {label:'Jul/24',mes:7,ano:2024,col:15},{label:'Ago/24',mes:8,ano:2024,col:16},{label:'Set/24',mes:9,ano:2024,col:17},
    {label:'Out/24',mes:10,ano:2024,col:18},{label:'Nov/24',mes:11,ano:2024,col:19},{label:'Dez/24',mes:12,ano:2024,col:20},
    {label:'Jan/25',mes:1,ano:2025,col:22},{label:'Fev/25',mes:2,ano:2025,col:23},{label:'Mar/25',mes:3,ano:2025,col:24},
    {label:'Abr/25',mes:4,ano:2025,col:25},{label:'Mai/25',mes:5,ano:2025,col:26},{label:'Jun/25',mes:6,ano:2025,col:27},
    {label:'Jul/25',mes:7,ano:2025,col:28},{label:'Ago/25',mes:8,ano:2025,col:29},{label:'Set/25',mes:9,ano:2025,col:30},
    {label:'Out/25',mes:10,ano:2025,col:31},{label:'Nov/25',mes:11,ano:2025,col:32},{label:'Dez/25',mes:12,ano:2025,col:33},
    {label:'Jan/26',mes:1,ano:2026,col:35},{label:'Fev/26',mes:2,ano:2026,col:36},{label:'Mar/26',mes:3,ano:2026,col:37},
    {label:'Abr/26',mes:4,ano:2026,col:38},{label:'Mai/26',mes:5,ano:2026,col:39},{label:'Jun/26',mes:6,ano:2026,col:40},
    {label:'Jul/26',mes:7,ano:2026,col:41},{label:'Ago/26',mes:8,ano:2026,col:42},{label:'Set/26',mes:9,ano:2026,col:43},
    {label:'Out/26',mes:10,ano:2026,col:44},{label:'Nov/26',mes:11,ano:2026,col:45},{label:'Dez/26',mes:12,ano:2026,col:46},
  ];
  const monthly=[];
  for(const m of CM){
    const bm=n(rows[13]?.[m.col]),ab=n(rows[14]?.[m.col]),dc=n(rows[20]?.[m.col]),lm=n(rows[22]?.[m.col]),al=n(rows[23]?.[m.col]);
    if(ab<=0&&al<=0)continue;
    const pct=ab>0&&bm>0?(bm/(ab-bm))*100:0;
    monthly.push({...m,brutoMen:bm,acumBruto:ab,desconto:Math.abs(dc),liqMen:lm,acumLiq:al,pct});
  }
  const aportes=[];
  daily.forEach(d=>{if(d.obs.toLowerCase().includes('aporte')){const m=d.obs.match(/r\$\s*([\d.,]+)/i);if(m){const v=parseFloat(m[1].replace(/\./g,'').replace(',','.'));if(!isNaN(v)&&v>0)aportes.push({data:d.data,valor:v,obs:d.obs});}}});
  const totalAportado=aportes.reduce((s,a)=>s+a.valor,0)||daily[0]?.saldo||0;
  return {daily,monthly,totalAportado,aportes};
}

  const valor=parseFloat(document.getElementById('meta_valor').value);
  const data=document.getElementById('meta_data').value;
  const desc=document.getElementById('meta_desc').value.trim();
  if(!valor||valor<=0){alert('Informe um valor válido.');return;}
  S.meta={valor,data,desc};
  await dbSet('meta',{meta:S.meta,updatedAt:Date.now()});
  closeMeta();
  if(S.view==='consolidado') CONS.render();

};

function renderMetaCard(patrimonioAtual){
  if(!S.meta) return `<div class="card" style="border:1.5px dashed var(--bdr);background:transparent;cursor:pointer" onclick="openMeta()">

    </div>
  </div>`;
  const pct=Math.min((patrimonioAtual/S.meta.valor)*100,100);
  const falta=Math.max(S.meta.valor-patrimonioAtual,0);
  const meses=S.meta.data?Math.max(0,Math.round((new Date(S.meta.data+'-01')-new Date())/(1000*60*60*24*30))):null;
  return `<div class="card" style="border-left:3px solid var(--purple)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">🎯</span><div><div style="font-size:13px;font-weight:700">${S.meta.desc||'Meta de patrimônio'}</div><div style="font-size:11px;color:var(--muted)">Alvo: ${fmt(S.meta.valor)}${S.meta.data?' · '+S.meta.data.replace('-','/'):''}${meses!==null?' · '+meses+' meses':''}</div></div></div>

    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)">
      <span class="purple" style="font-weight:600">${pct.toFixed(1)}% atingido · ${fmt(patrimonioAtual)}</span>
      <span>Falta ${fmt(falta)}</span>
    </div>
  </div>`;
}

      destroyChart('pieC');CH.pieC=new Chart(document.getElementById('pieC'),{type:'doughnut',data:{labels:tk,datasets:[{data:tk.map(k=>porTipo[k]),backgroundColor:tk.map(k=>TIPO_COLORS[k]||'#94a3b8'),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{color:TC(),font:{size:11},boxWidth:12}}}}});
      const ao=[...ativos].sort((a,b)=>{const ia=a.qtd*a.precoMedio,ib=b.qtd*b.precoMedio;return(ib>0?((b.qtd*(b.precoAtual||b.precoMedio)-ib)/ib):0)-(ia>0?((a.qtd*(a.precoAtual||a.precoMedio)-ia)/ia):0);});
      destroyChart('barL');CH.barL=new Chart(document.getElementById('barL'),{type:'bar',data:{labels:ao.map(a=>a.ticker),datasets:[{data:ao.map(a=>{const i=a.qtd*a.precoMedio,v=a.qtd*(a.precoAtual||a.precoMedio);return i>0?((v-i)/i)*100:0;}),backgroundColor:ao.map(a=>{const i=a.qtd*a.precoMedio,v=a.qtd*(a.precoAtual||a.precoMedio);return v>=i?'rgba(16,185,129,.75)':'rgba(239,68,68,.75)';}),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:TC(),font:{size:10}}},y:{grid:{color:GC()},ticks:{color:TC(),font:{size:10},callback:v=>v.toFixed(1)+'%'}}}}});
      const ap=[...ativos].sort((a,b)=>(b.qtd*(b.precoAtual||b.precoMedio))-(a.qtd*(a.precoAtual||a.precoMedio)));
      destroyChart('barP');CH.barP=new Chart(document.getElementById('barP'),{type:'bar',data:{labels:ap.map(a=>a.ticker),datasets:[{data:ap.map(a=>a.qtd*(a.precoAtual||a.precoMedio)),backgroundColor:perfil.cor+'bb',borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:TC(),font:{size:10}}},y:{grid:{color:GC()},ticks:{color:TC(),font:{size:10},callback:v=>'R$'+(v/1000).toFixed(1)+'k'}}}}});
    }
  },
  openModal(ativoId,perfilId){
    _eAtivoId=ativoId;_ePerfilId=perfilId;
    const perfil=S.perfis.find(p=>p.id===perfilId);
    document.getElementById('mAtivoTitle').textContent=ativoId?'Editar ativo':'Adicionar ativo';
    document.getElementById('mAtivoSub').textContent=perfil?.nome||'';
    if(ativoId){const a=(perfil?.ativos||[]).find(x=>x.id===ativoId);if(a){document.getElementById('fa_ticker').value=a.ticker||'';document.getElementById('fa_nome').value=a.nome||'';document.getElementById('fa_tipo').value=a.tipo||'Ação';document.getElementById('fa_corretora').value=a.corretora||'';document.getElementById('fa_qtd').value=a.qtd||'';document.getElementById('fa_preco').value=a.precoMedio||'';document.getElementById('fa_atual').value=a.precoAtual||'';}}
    else{['fa_ticker','fa_nome','fa_corretora','fa_qtd','fa_preco','fa_atual'].forEach(id=>{document.getElementById(id).value='';});document.getElementById('fa_tipo').value='Ação';}
    document.getElementById('modalAtivo').classList.add('open');
  },
  closeModal(){document.getElementById('modalAtivo').classList.remove('open');},
  async salvar(){
    const ticker=document.getElementById('fa_ticker').value.trim().toUpperCase();
    const nome=document.getElementById('fa_nome').value.trim();
    const tipo=document.getElementById('fa_tipo').value;
    const corretora=document.getElementById('fa_corretora').value.trim();
    const qtd=parseFloat(document.getElementById('fa_qtd').value);
    const preco=parseFloat(document.getElementById('fa_preco').value);
    const atual=parseFloat(document.getElementById('fa_atual').value)||0;
    if(!ticker||isNaN(qtd)||isNaN(preco)){alert('Preencha ticker, quantidade e preço médio.');return;}
    const btn=document.getElementById('btnSalvarAtivo');btn.disabled=true;btn.textContent='Salvando...';
    let precoAtual=atual;
    if(!precoAtual&&['Ação','FII','ETF'].includes(tipo)){const q=await fetchQuote(ticker);if(q)precoAtual=q.price;}
    const perfil=S.perfis.find(p=>p.id===_ePerfilId);
    if(!perfil){btn.disabled=false;btn.textContent='Salvar';return;}
    if(!perfil.ativos)perfil.ativos=[];
    if(_eAtivoId){const idx=perfil.ativos.findIndex(x=>x.id===_eAtivoId);if(idx>=0)perfil.ativos[idx]={...perfil.ativos[idx],ticker,nome,tipo,corretora,qtd,precoMedio:preco,precoAtual:precoAtual||preco,atualizadoEm:Date.now()};}
    else{perfil.ativos.push({id:Date.now().toString(),ticker,nome,tipo,corretora,qtd,precoMedio:preco,precoAtual:precoAtual||preco,atualizadoEm:Date.now()});}
    await dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()});
    this.closeModal();this.render(_ePerfilId);
    btn.disabled=false;btn.textContent='Salvar';
  },
  async delAtivo(ativoId,perfilId){
    if(!confirm('Remover este ativo?'))return;
    const perfil=S.perfis.find(p=>p.id===perfilId);
    if(perfil){perfil.ativos=(perfil.ativos||[]).filter(a=>a.id!==ativoId);await dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()});this.render(perfilId);}
  },
  openPerfil(){APP.closeDD();document.getElementById('fp_nome').value='';document.getElementById('fp_cor').value=PERFIL_CORES[S.perfis.length%PERFIL_CORES.length];document.getElementById('modalPerfil').classList.add('open');},
  closePerfil(){document.getElementById('modalPerfil').classList.remove('open');},
  async salvarPerfil(){
    const nome=document.getElementById('fp_nome').value.trim();const cor=document.getElementById('fp_cor').value;
    if(!nome){alert('Informe um nome.');return;}
    const id='p'+Date.now();S.perfis.push({id,nome,cor,ativos:[]});
    await dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()});
    this.closePerfil();buildNav();APP.goPerfil(id);
  },
  renamePerfil(id){
    const p=S.perfis.find(x=>x.id===id);if(!p)return;
    const novo=prompt('Novo nome:',p.nome);
    if(novo?.trim()){p.nome=novo.trim();dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()}).then(()=>{buildNav();this.render(id);});}
  }
};

// ── DIVIDENDOS ────────────────────────────────────────────────
window.DIVS={
  async load(perfilId){
    const btn=document.getElementById('btnDivs');
    if(btn){btn.disabled=true;btn.textContent='Buscando...';}
    const perfil=S.perfis.find(p=>p.id===perfilId);
    const ativos=(perfil?.ativos||[]).filter(a=>['Ação','FII','ETF'].includes(a.tipo));
    if(!ativos.length){document.getElementById('divsContent').innerHTML='<div class="empty" style="padding:1rem"><p>Nenhum ativo elegível para dividendos (Ações, FIIs, ETFs).</p></div>';if(btn){btn.disabled=false;btn.textContent='↻ Buscar proventos';}return;}

    // Busca dividendos de todos os ativos
    const resultados=[];
    for(const a of ativos){
      const divs=await fetchDividendos(a.ticker);
      divs.forEach(d=>{
        // Desconto: FII isento, Ação/ETF 15% na fonte sobre dividendo (JCP 15%)
        const isento=a.tipo==='FII';
        const ir=isento?0:d.valorPorCota*0.15;
        const liq=(d.valorPorCota-ir)*a.qtd;
        resultados.push({ticker:a.ticker,tipo:a.tipo,qtd:a.qtd,data:d.data,valorCota:d.valorPorCota,provento:d.tipo,total:d.valorPorCota*a.qtd,ir:ir*a.qtd,liquido:liq,isento});
      });
    }
    resultados.sort((a,b)=>b.data.localeCompare(a.data));

    if(!resultados.length){document.getElementById('divsContent').innerHTML='<div class="empty" style="padding:1rem"><p>Nenhum provento encontrado para os ativos cadastrados.</p></div>';if(btn){btn.disabled=false;btn.textContent='↻ Buscar proventos';}return;}

    // Agrupa por mês
    const porMes={};
    resultados.forEach(r=>{const m=r.data.substring(0,7);porMes[m]=(porMes[m]||0)+r.liquido;});
    const meses=Object.keys(porMes).sort().slice(-12);
    const totalAnual=resultados.filter(r=>r.data>=new Date().getFullYear()+'-01-01').reduce((s,r)=>s+r.liquido,0);
    const totalGeral=resultados.reduce((s,r)=>s+r.liquido,0);
    const mediaMensal=meses.length>0?meses.reduce((s,m)=>s+porMes[m],0)/meses.length:0;

    document.getElementById('divsContent').innerHTML=`
      <div class="metrics" style="margin-bottom:1rem">
        <div class="mc"><div class="ml">Total recebido</div><div class="mv purple">${fmt(totalGeral)}</div><div class="ms muted">histórico completo</div></div>
        <div class="mc"><div class="ml">No ano</div><div class="mv purple">${fmt(totalAnual)}</div><div class="ms muted">${new Date().getFullYear()}</div></div>
        <div class="mc"><div class="ml">Média mensal</div><div class="mv purple">${fmt(mediaMensal)}</div><div class="ms muted">últimos ${meses.length} meses</div></div>
      </div>
      <div class="g2" style="margin-bottom:1rem">
        <div class="card"><div class="card-title">Proventos mensais líquidos (R$)</div><div class="cw h160"><canvas id="divChart"></canvas></div></div>
        <div class="card">
          <div class="card-title">Últimos proventos</div>
          <div style="max-height:160px;overflow-y:auto">
            ${resultados.slice(0,8).map(r=>`
            <div class="div-row">
              <div><strong>${r.ticker}</strong> <span class="badge bpurple" style="font-size:10px">${r.provento}</span></div>
              <div style="text-align:right">
                <div class="purple" style="font-weight:600">${fmt(r.liquido)}</div>
                <div class="seg">${r.qtd} × ${fmt(r.valorCota)} ${r.isento?'<span style="color:var(--green);font-size:10px">isento</span>':'<span class="muted" style="font-size:10px">IR: '+fmt(r.ir)+'</span>'}</div>
                <div class="seg">${r.data}</div>
              </div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    `;

    destroyChart('divChart');
    CH.divChart=new Chart(document.getElementById('divChart'),{type:'bar',data:{labels:meses.map(m=>{const[y,mo]=m.split('-');return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(mo)-1]+'/'+y.slice(2);}),datasets:[{data:meses.map(m=>porMes[m]),backgroundColor:'rgba(124,58,237,.65)',borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:TC(),font:{size:10}}},y:{grid:{color:GC()},ticks:{color:TC(),font:{size:10},callback:v=>'R$'+(v/1000).toFixed(1)+'k'}}}}});
    if(btn){btn.disabled=false;btn.textContent='↻ Buscar proventos';}
  }
};

// ── CONSOLIDADO ───────────────────────────────────────────────
window.CONS={
  render(){
    const tradeLiq=S.tradePayload?.monthly?.slice(-1)[0]?.acumLiq||0;
    const tradeInv=S.tradePayload?.totalAportado||0;
    let totalInvG=tradeInv,totalAtG=tradeLiq;
    const rows=S.perfis.map(p=>{
      const ativos=p.ativos||[];
      const inv=ativos.reduce((s,a)=>s+(a.qtd*a.precoMedio),0);
      const at=ativos.reduce((s,a)=>s+(a.qtd*(a.precoAtual||a.precoMedio)),0);
      totalInvG+=inv;totalAtG+=at;
      return {nome:p.nome,cor:p.cor,inv,at,lucro:at-inv,pct:inv>0?((at-inv)/inv)*100:0,qtd:ativos.length};
    });
    const lucroG=totalAtG-totalInvG,pctG=totalInvG>0?(lucroG/totalInvG)*100:0;
    const pieLabels=['Trade (líq.)',...S.perfis.map(p=>p.nome)];
    const pieVals=[tradeLiq,...S.perfis.map(p=>(p.ativos||[]).reduce((s,a)=>s+(a.qtd*(a.precoAtual||a.precoMedio)),0))];
    const pieCors=['#f59e0b',...S.perfis.map(p=>p.cor)];
    document.getElementById('content').innerHTML=`
      <div class="tab-header"><div><h2>Visão Consolidada</h2><p class="sub">Patrimônio total de todas as carteiras</p></div></div>
      ${renderMetaCard(totalAtG)}
      <div class="metrics">
        <div class="mc"><div class="ml">Patrimônio total</div><div class="mv ${totalAtG>=totalInvG?'green':'red'}">${fmt(totalAtG)}</div><div class="ms muted">todas as carteiras</div></div>
        <div class="mc"><div class="ml">Total investido</div><div class="mv neutral">${fmt(totalInvG)}</div><div class="ms muted">capital aportado</div></div>
        <div class="mc"><div class="ml">Lucro total</div><div class="mv ${lucroG>=0?'green':'red'}">${fmt(lucroG)}</div><div class="ms ${pctG>=0?'green':'red'}">${fmtP(pctG)}</div></div>
        <div class="mc"><div class="ml">Trade (líq.)</div><div class="mv amber">${fmt(tradeLiq)}</div><div class="ms muted">saldo líquido</div></div>
      </div>
      <div class="g2">
        <div class="card span2"><div class="card-title">Distribuição do patrimônio</div><div class="cw h240"><canvas id="pieG"></canvas></div></div>
        ${S.tradePayload?`<div class="card" style="border-left:3px solid #f59e0b">
          <span class="perfil-badge" style="background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;display:inline-block;margin-bottom:12px">Trade</span>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><div class="ml">Aportado</div><div style="font-size:15px;font-weight:600">${fmt(tradeInv)}</div></div>
            <div><div class="ml">Saldo líquido</div><div style="font-size:15px;font-weight:600;color:var(--green)">${fmt(tradeLiq)}</div></div>
            <div><div class="ml">Lucro líquido</div><div style="font-size:15px;font-weight:600;color:var(--green)">${fmt(tradeLiq-tradeInv)}</div></div>
            <div><div class="ml">Rentab.</div><span class="badge bp">${fmtP(tradeInv>0?((tradeLiq-tradeInv)/tradeInv)*100:0)}</span></div>
          </div>
        </div>`:''}
        ${rows.map(r=>`<div class="card" style="border-left:3px solid ${r.cor}">
          <span class="perfil-badge" style="background:${r.cor}22;color:${r.cor};border:1px solid ${r.cor}44;display:inline-block;margin-bottom:12px">${r.nome}</span>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><div class="ml">Investido</div><div style="font-size:15px;font-weight:600">${fmt(r.inv)}</div></div>
            <div><div class="ml">Valor atual</div><div style="font-size:15px;font-weight:600;color:${r.at>=r.inv?'var(--green)':'var(--red)'}">${fmt(r.at)}</div></div>
            <div><div class="ml">Lucro</div><div style="font-size:15px;font-weight:600;color:${r.lucro>=0?'var(--green)':'var(--red)'}">${fmt(r.lucro)}</div></div>
            <div><div class="ml">Rentab.</div><span class="badge ${r.pct>=0?'bp':'bn'}">${fmtP(r.pct)}</span></div>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--muted)">${r.qtd} ativos</div>
        </div>`).join('')}
      </div>
    `;
    destroyChart('pieG');CH.pieG=new Chart(document.getElementById('pieG'),{type:'doughnut',data:{labels:pieLabels,datasets:[{data:pieVals,backgroundColor:pieCors,borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{color:TC(),font:{size:12},boxWidth:14,padding:14}},tooltip:{callbacks:{label:i=>' '+fmt(i.raw)+' ('+((i.raw/pieVals.reduce((a,b)=>a+b,0))*100).toFixed(1)+'%)'}}}}});
  }
};

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  APP.setStatus('Conectando ao servidor...');

  // Carrega perfis
  try{const snap=await dbGet('perfis');if(snap.exists())S.perfis=snap.data().lista||[];}catch(e){}
  if(S.perfis.length===0){
    S.perfis=[{id:'minha',nome:'Minha Carteira',cor:'#3b82f6',ativos:[]},{id:'gigi',nome:'Carteira Gigi',cor:'#ec4899',ativos:[]}];
    await dbSet('perfis',{lista:S.perfis,updatedAt:Date.now()});
  }
  S.perfilAtivo=S.perfis[0].id;

  // Carrega meta
  try{const snap=await dbGet('meta');if(snap.exists())S.meta=snap.data().meta||null;}catch(e){}

  // Escuta trade
  dbWatch('dashboard',snap=>{
    APP.showMain();buildNav();
    if(snap.exists()&&snap.data().payload){
      S.tradePayload=snap.data().payload;S.tradeUpdAt=snap.data().updatedAt;
      if(S.view==='trade')TRADE.render(S.tradePayload,S.tradeUpdAt);
      if(S.view==='consolidado')CONS.render();
    } else {
      TRADE.render(null,null);
    }
  });

  // Escuta perfis
  dbWatch('perfis',snap=>{
    if(snap.exists()){S.perfis=snap.data().lista||[];buildNav();if(S.view==='carteira')CART.render(S.perfilAtivo);if(S.view==='consolidado')CONS.render();}
  });

  // Escuta meta
  dbWatch('meta',snap=>{if(snap.exists())S.meta=snap.data().meta||null;});

  startAutoUpdate(S.perfilAtivo);
}
init();
</script>
